services:
  kys-scraper:
    build: .
    ports:
      - "${PORT:-8081}:${PORT:-8081}"
    environment:
      - GIN_MODE=release
      - PORT=${PORT:-8081}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:${PORT:-8081}/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
