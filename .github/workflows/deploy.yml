name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o scraper ./cmd/server/main.go

      - name: Copy binary to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: scraper
          target: /home/${{ secrets.VPS_USER }}/kys-scraper/

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cat > /home/${{ secrets.VPS_USER }}/kys-scraper/.env << EOF
            PORT=${{ secrets.PORT }}
            ALLOWED_ORIGIN=${{ secrets.ALLOWED_ORIGIN }}
            GIN_MODE=release
            GOOGLE_BOOKS_API_KEY=${{ secrets.GOOGLE_BOOKS_API_KEY }}
            EOF

            sudo systemctl restart kys-scraper
